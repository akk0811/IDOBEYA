name: IDOBEYA
options:
  bundleIdPrefix: com.idobeya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  IDOBEYA:
    type: application
    platform: iOS
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    sources:
      - path: IDOBEYA
        excludes:
          - Resources/SupabaseSecrets.plist.example
          - Views/Auth/AuthView.swift
          - Views/Rooms/RoomListView.swift
          - Views/Rooms/RoomDetailView.swift
          - Views/Rooms/RoomEditView.swift
          - Views/Thread
          - Views/Chat
          - Views/Safety
    resources:
      - path: IDOBEYA/Resources/SupabaseSecrets.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idobeya.app
        INFOPLIST_KEY_CFBundleDisplayName: IDOBEYA
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: IDOBEYA/Info.plist
